name: sein
id: https://timformatie.github.io/SEIN-OMOP/sein
description: >-
  Combined schema for the SEIN-OMOP project. Merges HiX staging classes
  (source system) with the OMOP CDM v5.4 target classes. Slot-level ETL
  mappings from HiX to OMOP are expressed as exact_mappings using the
  omop_cdm54 prefix.
imports:
- linkml:types
prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  sein:
    prefix_prefix: sein
    prefix_reference: https://timformatie.github.io/SEIN-OMOP/sein/
  omop_cdm54:
    prefix_prefix: omop_cdm54
    prefix_reference: https://timformatie.github.io/SEIN-OMOP/omop-cdm54/
default_prefix: sein
default_range: string

