# ---------------------------------------------------------------------------
# OMOP CDM v5.4 classes (domains: clinical / vocabulary / infrastructure)
# ---------------------------------------------------------------------------

  CdmSource:
    name: CdmSource
    annotations:
      group: infrastructure
    description: The CDM_SOURCE table contains detail about the source database and
      the process used to transform the data into the OMOP Common Data Model.
    attributes:
      cdm_source_name:
        name: cdm_source_name
        description: The name of the CDM instance.
        required: true
      cdm_source_abbreviation:
        name: cdm_source_abbreviation
        description: The abbreviation of the CDM instance.
        required: true
      cdm_holder:
        name: cdm_holder
        description: The holder of the CDM instance.
        required: true
      source_description:
        name: source_description
        description: The description of the CDM instance.
      source_documentation_reference:
        name: source_documentation_reference
        description: Refers to a publication or web resource describing the source data
      cdm_etl_reference:
        name: cdm_etl_reference
      source_release_date:
        name: source_release_date
        description: The date the data was extracted from the source system.
        required: true
      cdm_release_date:
        name: cdm_release_date
        description: The date the ETL script was completed.
        required: true
      cdm_version:
        name: cdm_version
        description: Version of the OMOP CDM used as string. e.g. v5.4
      cdm_version_concept_id:
        name: cdm_version_concept_id
        description: The Concept Id representing the version of the CDM.
        range: Concept
        required: true
      vocabulary_version:
        name: vocabulary_version
        description: Version of the OMOP standardised vocabularies loaded
        required: true

  ConceptAncestor:
    name: ConceptAncestor
    annotations:
      group: vocabulary
    description: The CONCEPT_ANCESTOR table is designed to simplify observational
      analysis by providing the complete hierarchical relationships between Concepts.
    attributes:
      ancestor_concept_id:
        name: ancestor_concept_id
        description: The Concept Id for the higher-level concept that forms the ancestor
          in the relationship.
        range: Concept
        required: true
      descendant_concept_id:
        name: descendant_concept_id
        description: The Concept Id for the lower-level concept that forms the descendant
          in the relationship.
        range: Concept
        required: true
      min_levels_of_separation:
        name: min_levels_of_separation
        description: The minimum separation in number of levels of hierarchy between
          ancestor and descendant concepts.
        required: true
      max_levels_of_separation:
        name: max_levels_of_separation
        description: The maximum separation in number of levels of hierarchy between
          ancestor and descendant concepts.
        required: true

  ConceptClass:
    name: ConceptClass
    annotations:
      group: vocabulary
    description: The CONCEPT_CLASS table includes semantic categories that reference
      the source structure of each Vocabulary.
    attributes:
      concept_class_id:
        name: concept_class_id
        description: A unique key for each class.
        identifier: true
        required: true
      concept_class_name:
        name: concept_class_name
        description: The name describing the Concept Class.
        required: true
      concept_class_concept_id:
        name: concept_class_concept_id
        description: A Concept that represents the Concept Class.
        range: Concept
        required: true

  ConceptRelation:
    name: ConceptRelation
    annotations:
      group: vocabulary
    description: The CONCEPT_RELATIONSHIP table contains records that define relationships
      between any two Concepts and the nature or type of the relationship.
    attributes:
      concept_id_1:
        name: concept_id_1
        range: Concept
        required: true
      concept_id_2:
        name: concept_id_2
        range: Concept
        required: true
      relationship_id:
        name: relationship_id
        description: The relationship between CONCEPT_ID_1 and CONCEPT_ID_2.
        range: Relationship
        required: true
      valid_start_date:
        name: valid_start_date
        description: The date when the relationship is first recorded.
        required: true
      valid_end_date:
        name: valid_end_date
        description: The date when the relationship is invalidated.
        required: true
      invalid_reason:
        name: invalid_reason
        description: Reason the relationship was invalidated.

  ConceptSynonym:
    name: ConceptSynonym
    annotations:
      group: vocabulary
    description: The CONCEPT_SYNONYM table captures alternative terms, synonyms, and
      translations of Concept Name into various languages.
    attributes:
      concept_id:
        name: concept_id
        range: Concept
        required: true
      concept_synonym_name:
        name: concept_synonym_name
        required: true
      language_concept_id:
        name: language_concept_id
        range: Concept
        required: true

  Concept:
    name: Concept
    annotations:
      group: vocabulary
    description: The Standardized Vocabularies contains records, or Concepts, that
      uniquely identify each fundamental unit of meaning used to express clinical
      information in all domain tables of the CDM.
    attributes:
      concept_id:
        name: concept_id
        description: A unique identifier for each Concept across all domains.
        identifier: true
        required: true
      concept_name:
        name: concept_name
        description: An unambiguous, meaningful and descriptive name for the Concept.
        required: true
      domain_id:
        name: domain_id
        description: A foreign key to the DOMAIN table the Concept belongs to.
        range: Domain
        required: true
      vocabulary_id:
        name: vocabulary_id
        description: A foreign key to the VOCABULARY table indicating from which source
          the Concept has been adapted.
        range: Vocabulary
        required: true
      concept_class_id:
        name: concept_class_id
        description: The attribute or concept class of the Concept.
        range: ConceptClass
        required: true
      standard_concept:
        name: standard_concept
        description: Flag determining whether a Concept is Standard, Classification,
          or non-standard.
      concept_code:
        name: concept_code
        description: The concept code represents the identifier of the Concept in the
          source vocabulary.
        required: true
      valid_start_date:
        name: valid_start_date
        description: The date when the Concept was first recorded.
        required: true
      valid_end_date:
        name: valid_end_date
        description: The date when the Concept became invalid.
        required: true
      invalid_reason:
        name: invalid_reason
        description: Reason the Concept was invalidated.

  ConditionOccurrence:
    name: ConditionOccurrence
    annotations:
      group: clinical
    description: This table captures records of conditions observed for a Person.
    attributes:
      condition_occurrence_id:
        name: condition_occurrence_id
        description: The unique key given to a condition record for a person.
        identifier: true
        required: true
      person_id:
        name: person_id
        description: The PERSON_ID of the PERSON for whom the condition is recorded.
        range: Person
        required: true
      condition_concept_id:
        name: condition_concept_id
        description: The standard concept mapped from the source value which represents
          a condition.
        range: Concept
        required: true
      condition_start_date:
        name: condition_start_date
        description: Use this date to determine the start date of the condition.
        required: true
      condition_start_datetime:
        name: condition_start_datetime
      condition_end_date:
        name: condition_end_date
        description: Use this date to determine the end date of the condition.
      condition_end_datetime:
        name: condition_end_datetime
      condition_type_concept_id:
        name: condition_type_concept_id
        description: This field can be used to determine the provenance of the Condition
          record.
        range: Concept
        required: true
      condition_status_concept_id:
        name: condition_status_concept_id
        description: This concept represents the point during the visit the diagnosis
          was given.
        range: Concept
      stop_reason:
        name: stop_reason
        description: The Stop Reason indicates why a Condition is no longer valid.
      provider_id:
        name: provider_id
        description: The provider associated with condition record.
      visit_occurrence_id:
        name: visit_occurrence_id
        description: The visit during which the condition occurred.
        range: VisitOccurrence
      visit_detail_id:
        name: visit_detail_id
        description: The VISIT_DETAIL record during which the condition occurred.
      condition_source_value:
        name: condition_source_value
        description: This field houses the verbatim value from the source data representing
          the condition that occurred.
      condition_source_concept_id:
        name: condition_source_concept_id
        description: This is the concept representing the condition source value.
        range: Concept
      condition_status_source_value:
        name: condition_status_source_value
        description: This field houses the verbatim value from the source data representing
          the condition status.

  Domain:
    name: Domain
    annotations:
      group: vocabulary
    description: The DOMAIN table includes a list of OMOP-defined Domains to which
      the Concepts of the Standardized Vocabularies can belong.
    attributes:
      domain_id:
        name: domain_id
        description: A unique key for each domain.
        identifier: true
        required: true
      domain_name:
        name: domain_name
        description: The name describing the Domain.
        required: true
      domain_concept_id:
        name: domain_concept_id
        description: A Concept representing the Domain Concept the DOMAIN record belongs
          to.
        range: Concept
        required: true

  DrugExposure:
    name: DrugExposure
    annotations:
      group: clinical
    description: This table captures records about the exposure to a Drug ingested
      or otherwise introduced into the body.
    attributes:
      drug_exposure_id:
        name: drug_exposure_id
        description: The unique key given to records of drug dispensings or administrations
          for a person.
        identifier: true
        required: true
      person_id:
        name: person_id
        description: The PERSON_ID of the PERSON for whom the drug dispensing or administration
          is recorded.
        range: Person
        required: true
      drug_concept_id:
        name: drug_concept_id
        description: This is the standard concept mapped from the source concept id
          which represents a drug product or molecule.
        range: Concept
        required: true
      drug_exposure_start_date:
        name: drug_exposure_start_date
        description: Start date of a prescription or the date on which a Drug administration
          was recorded.
        required: true
      drug_exposure_start_datetime:
        name: drug_exposure_start_datetime
      drug_exposure_end_date:
        name: drug_exposure_end_date
        description: The day the drug exposure ended for the patient.
        required: true
      drug_exposure_end_datetime:
        name: drug_exposure_end_datetime
      verbatim_end_date:
        name: verbatim_end_date
        description: This is the end date of the drug exposure as it appears in the
          source data.
      drug_type_concept_id:
        name: drug_type_concept_id
        description: Use the TYPE_CONCEPT_ID to delineate between prescriptions written
          vs. dispensed vs. medication history.
        range: Concept
        required: true
      stop_reason:
        name: stop_reason
        description: The reason a person stopped a medication as it is represented
          in the source.
      refills:
        name: refills
        description: Intended refills at time of the prescription.
      quantity:
        name: quantity
        description: Total amount dispensed or ordered of ingredient.
      days_supply:
        name: days_supply
        description: The number of days of supply of the medication.
      sig:
        name: sig
        description: The verbatim instruction for the drug as written by the provider.
      route_concept_id:
        name: route_concept_id
        description: The standard CONCEPT_ID that the ROUTE_SOURCE_VALUE maps to.
        range: Concept
      lot_number:
        name: lot_number
      provider_id:
        name: provider_id
        description: The Provider associated with drug record.
      visit_occurrence_id:
        name: visit_occurrence_id
        description: The Visit during which the drug was prescribed, administered or
          dispensed.
        range: VisitOccurrence
      visit_detail_id:
        name: visit_detail_id
        description: The VISIT_DETAIL record during which the drug exposure occurred.
      drug_source_value:
        name: drug_source_value
        description: This field houses the verbatim value from the source data representing
          the drug exposure.
      drug_source_concept_id:
        name: drug_source_concept_id
        description: This is the concept representing the drug source value.
        range: Concept
      route_source_value:
        name: route_source_value
        description: This field houses the verbatim value from the source data representing
          the drug route.
      dose_unit_source_value:
        name: dose_unit_source_value
        description: This field houses the verbatim value from the source data representing
          the dose unit of the drug given.

  Location:
    name: Location
    annotations:
      group: infrastructure
    description: The LOCATION table represents a generic way to capture physical location
      or address information of Persons and Care Sites.
    attributes:
      location_id:
        name: location_id
        description: The unique key given to a unique Location.
        identifier: true
        required: true
      address_1:
        name: address_1
        description: This is the first line of the address.
      address_2:
        name: address_2
        description: This is the second line of the address.
      city:
        name: city
      state:
        name: state
      zip:
        name: zip
      county:
        name: county
      location_source_value:
        name: location_source_value
      country_concept_id:
        name: country_concept_id
        description: The Concept Id representing the country.
        range: Concept
      country_source_value:
        name: country_source_value
        description: The name of the country.
      latitude:
        name: latitude
      longitude:
        name: longitude

  Note:
    name: Note
    annotations:
      group: clinical
    description: The NOTE table captures unstructured information that was recorded
      by a provider about a patient in free text notes on a given date.
    attributes:
      note_id:
        name: note_id
        description: A unique identifier for each note.
        identifier: true
        required: true
      person_id:
        name: person_id
        range: Person
        required: true
      note_date:
        name: note_date
        description: The date the note was recorded.
        required: true
      note_datetime:
        name: note_datetime
      note_type_concept_id:
        name: note_type_concept_id
        description: The provenance of the note.
        range: Concept
        required: true
      note_class_concept_id:
        name: note_class_concept_id
        description: A Standard Concept Id representing the HL7 LOINC Document Type
          Vocabulary classification of the note.
        range: Concept
        required: true
      note_title:
        name: note_title
        description: The title of the note.
      note_text:
        name: note_text
        description: The content of the note.
        required: true
      encoding_concept_id:
        name: encoding_concept_id
        description: This is the Concept representing the character encoding type.
        range: Concept
        required: true
      language_concept_id:
        name: language_concept_id
        description: The language of the note.
        range: Concept
        required: true
      provider_id:
        name: provider_id
        description: The Provider who wrote the note.
      visit_occurrence_id:
        name: visit_occurrence_id
        description: The Visit during which the note was written.
        range: VisitOccurrence
      visit_detail_id:
        name: visit_detail_id
        description: The Visit Detail during which the note was written.
      note_source_value:
        name: note_source_value
      note_event_id:
        name: note_event_id
        description: If the Note record is related to another record in the database,
          this field is the primary key of the linked record.
      note_event_field_concept_id:
        name: note_event_field_concept_id
        description: The CONCEPT_ID that identifies which table the primary key of
          the linked record came from.
        range: Concept

  ObservationPeriod:
    name: ObservationPeriod
    annotations:
      group: clinical
    description: This table contains records which define spans of time during which
      Clinical Events that happened to the Person are recorded.
    attributes:
      observation_period_id:
        name: observation_period_id
        description: A Person can have multiple discrete Observation Periods which
          are identified by the Observation_Period_Id.
        identifier: true
        required: true
      person_id:
        name: person_id
        description: The Person ID of the PERSON record for which the Observation
          Period is recorded.
        range: Person
        required: true
      observation_period_start_date:
        name: observation_period_start_date
        description: Use this date to determine the start date of the Observation
          Period.
        required: true
      observation_period_end_date:
        name: observation_period_end_date
        description: Use this date to determine the end date of the period for which
          we can assume that all events for a Person are recorded.
        required: true
      period_type_concept_id:
        name: period_type_concept_id
        description: This field can be used to determine the provenance of the Observation
          Period.
        range: Concept
        required: true

  Person:
    name: Person
    annotations:
      group: clinical
    description: This table serves as the central identity management for all Persons
      in the database.
    attributes:
      person_id:
        name: person_id
        description: Every person with a different unique identifier is a different
          person and should be treated independently.
        identifier: true
        required: true
      gender_concept_id:
        name: gender_concept_id
        description: This field is meant to capture the biological sex at birth of
          the Person.
        range: Concept
        required: true
      year_of_birth:
        name: year_of_birth
        description: Compute age using year_of_birth.
        required: true
      month_of_birth:
        name: month_of_birth
      day_of_birth:
        name: day_of_birth
      birth_datetime:
        name: birth_datetime
      race_concept_id:
        name: race_concept_id
        description: This field captures race or ethnic background of the person.
        range: Concept
        required: true
      ethnicity_concept_id:
        name: ethnicity_concept_id
        description: This field captures Ethnicity as defined by the OMB.
        range: Concept
        required: true
      location_id:
        name: location_id
        description: The location refers to the physical address of the person.
        range: Location
      provider_id:
        name: provider_id
        description: The Provider refers to the last known primary care provider.
      care_site_id:
        name: care_site_id
        description: The Care Site refers to where the Provider typically provides
          the primary care.
      person_source_value:
        name: person_source_value
        description: Use this field to link back to persons in the source data.
      gender_source_value:
        name: gender_source_value
        description: This field is used to store the biological sex of the person
          from the source data.
      gender_source_concept_id:
        name: gender_source_concept_id
        description: Due to the small number of options, this tends to be zero.
        range: Concept
      race_source_value:
        name: race_source_value
        description: This field is used to store the race of the person from the source
          data.
      race_source_concept_id:
        name: race_source_concept_id
        description: Due to the small number of options, this tends to be zero.
        range: Concept
      ethnicity_source_value:
        name: ethnicity_source_value
        description: This field is used to store the ethnicity of the person from
          the source data.
      ethnicity_source_concept_id:
        name: ethnicity_source_concept_id
        description: Due to the small number of options, this tends to be zero.
        range: Concept

  Relationship:
    name: Relationship
    annotations:
      group: vocabulary
    description: The RELATIONSHIP table provides a reference list of all types of
      relationships that can be used to associate any two Concepts.
    attributes:
      relationship_id:
        name: relationship_id
        description: The type of relationship captured by the relationship record.
        identifier: true
        required: true
      relationship_name:
        name: relationship_name
        required: true
      is_hierarchical:
        name: is_hierarchical
        description: Defines whether a relationship defines concepts into classes
          or hierarchies.
        required: true
      defines_ancestry:
        name: defines_ancestry
        description: Defines whether a hierarchical relationship contributes to the
          concept_ancestor table.
        required: true
      reverse_relationship_id:
        name: reverse_relationship_id
        description: The identifier for the relationship used to define the reverse
          relationship between two concepts.
        required: true
      relationship_concept_id:
        name: relationship_concept_id
        description: A foreign key that refers to an identifier in the CONCEPT table
          for the unique relationship concept.
        range: Concept
        required: true

  VisitOccurrence:
    name: VisitOccurrence
    annotations:
      group: clinical
    description: This table contains Events where Persons engage with the healthcare
      system for a duration of time.
    attributes:
      visit_occurrence_id:
        name: visit_occurrence_id
        description: Use this to identify unique interactions between a person and
          the health care system.
        identifier: true
        required: true
      person_id:
        name: person_id
        range: Person
        required: true
      visit_concept_id:
        name: visit_concept_id
        description: This field contains a concept id representing the kind of visit.
        range: Concept
        required: true
      visit_start_date:
        name: visit_start_date
        description: For inpatient visits, the start date is typically the admission
          date.
        required: true
      visit_start_datetime:
        name: visit_start_datetime
      visit_end_date:
        name: visit_end_date
        description: For inpatient visits the end date is typically the discharge
          date.
        required: true
      visit_end_datetime:
        name: visit_end_datetime
      visit_type_concept_id:
        name: visit_type_concept_id
        description: Use this field to understand the provenance of the visit record.
        range: Concept
        required: true
      provider_id:
        name: provider_id
        description: There will only be one provider per visit record.
      care_site_id:
        name: care_site_id
        description: This field provides information about the Care Site where the
          Visit took place.
      preceding_visit_occurrence_id:
        name: preceding_visit_occurrence_id
        description: Use this field to find the visit that occurred for the person
          prior to the given visit.
        range: VisitOccurrence
      visit_source_value:
        name: visit_source_value
        description: This field houses the verbatim value from the source data representing
          the kind of visit.
      visit_source_concept_id:
        name: visit_source_concept_id
        range: Concept
      admitted_from_concept_id:
        name: admitted_from_concept_id
        description: Use this field to determine where the patient was admitted from.
        range: Concept
      admitted_from_source_value:
        name: admitted_from_source_value
      discharged_to_concept_id:
        name: discharged_to_concept_id
        description: Use this field to determine where the patient was discharged
          to after a visit.
        range: Concept
      discharged_to_source_value:
        name: discharged_to_source_value

  Vocabulary:
    name: Vocabulary
    annotations:
      group: vocabulary
    description: The VOCABULARY table includes a list of the Vocabularies integrated
      from various sources or created de novo in OMOP CDM.
    attributes:
      vocabulary_id:
        name: vocabulary_id
        description: A unique identifier for each Vocabulary, such as ICD9CM, SNOMED,
          Visit.
        identifier: true
        required: true
      vocabulary_name:
        name: vocabulary_name
        description: The name describing the vocabulary.
        required: true
      vocabulary_reference:
        name: vocabulary_reference
        description: External reference to documentation or available download of
          the vocabulary.
      vocabulary_version:
        name: vocabulary_version
        description: Version of the Vocabulary as indicated in the source.
      vocabulary_concept_id:
        name: vocabulary_concept_id
        description: A Concept that represents the Vocabulary the VOCABULARY record
          belongs to.
        range: Concept
        required: true
